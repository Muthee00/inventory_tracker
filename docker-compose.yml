name: Django CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inventory
          POSTGRES_USER: invent_admin
          POSTGRES_PASSWORD: soft2025
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invent_admin -d inventory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./django-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Migrations & Tests
        working-directory: ./django-api
        env:
          DEBUG: "False"
          DB_NAME: inventory
          DB_USER: invent_admin
          DB_PASSWORD: soft2025
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DJANGO_SECRET_KEY: "django-insecure-test-key-only-for-ci"
          # Add any other required env vars here
        run: |
          python manage.py migrate --noinput
          python manage.py test
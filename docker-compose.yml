services:
  postgres:
    image: postgres:16
    env:
      POSTGRES_DB: inventory
      POSTGRES_USER: invent_admin
      POSTGRES_PASSWORD: soft2025
    ports:
      - 5432:5432

  backend:
    # REMOVED: build: ./django-api
    # ADDED: Pull the image from Docker Hub instead
    image: ${DOCKER_USERNAME}/inventory-app-backend:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - mysql

  nginx:
    # REMOVED: image: nginx:alpine
    # ADDED: Pull your custom frontend image containing the React build and Nginx config
    image: ${DOCKER_USERNAME}/inventory-app-frontend:latest
    restart: always
    ports:
      - "80"
    # REMOVED the volumes that tried to mount local files that don't exist on the VPS
    depends_on:
      - backend

volumes:
  mysql_data:
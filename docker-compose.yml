services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_ROOT_PASSWORD: soft2025
      MYSQL_USER: myappuser
      MYSQL_PASSWORD: StrongPassword
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./django-api
    restart: always
    env_file:
      - ./django-api/.env
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./inventory-app/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
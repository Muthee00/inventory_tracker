services:
  postgres:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: invent_admin
      POSTGRES_PASSWORD: soft2025

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invent_admin -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME}/inventory-app-backend:latest
    restart: always

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: ${DOCKER_USERNAME}/inventory-app-frontend:latest
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

volumes:
  postgres_data: